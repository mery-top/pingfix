version: "3.9"

services:
  backend:
    build: ./backend
    container_name: backend
    ports:
      - "8080:8080"
    env_file:
      - .env
      - backend/.env
    environment:
      - DOCKER_ENV=true
    depends_on:
      - redis

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "5173:80"
    env_file:
      - .env
      - backend/.env

  redis:
    image: redis:7-alpine
    container_name: redis
    env_file:
      - .env
      - backend/.env
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
      
volumes:
  redis-data: 